name: PR - Code Review Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality & Size Check
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd frontend && npm install
          cd ../backend && npm install
      
      - name: Check bundle size (frontend)
        run: |
          cd frontend
          npm run build
          SIZE=$(du -sh dist | cut -f1)
          echo "📦 Frontend build size: $SIZE"
      
      - name: Run prettier check
        run: |
          npm install -g prettier
          prettier --check . --ignore-path .gitignore || true
      
      - name: Comment PR with artifact links
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "**📋 PR Checklist:**\n\n- [ ] Tests are passing ✅\n- [ ] No breaking changes\n- [ ] Code follows project style guide\n- [ ] Documentation updated (if needed)\n- [ ] Environment variables documented\n\n**Build Status:**\n- [ ] Frontend builds successfully\n- [ ] Backend builds successfully\n- [ ] No console errors/warnings"
            })

  validate-files:
    runs-on: ubuntu-latest
    name: File & Config Validation
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate package.json files
        run: |
          echo "Validating package.json files..."
          node -e "JSON.parse(require('fs').readFileSync('./package.json'))"
          node -e "JSON.parse(require('fs').readFileSync('./frontend/package.json'))"
          node -e "JSON.parse(require('fs').readFileSync('./backend/package.json'))"
          echo "✅ All package.json files are valid"
      
      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: origin/main
          head: HEAD
          extra_args: --debug
        continue-on-error: true

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Audit
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Audit frontend dependencies
        run: |
          cd frontend
          npm audit --audit-level=moderate || true
      
      - name: Audit backend dependencies
        run: |
          cd backend
          npm audit --audit-level=moderate || true
